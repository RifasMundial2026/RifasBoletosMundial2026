<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifa Mundial PREMIUM</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body { margin:0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);} 
.container { max-width: 980px; margin:auto; padding:20px; background: rgba(255,255,255,0.95); border-radius:15px; }
h1 { text-align:center; font-family:'Anton'; }
.info { text-align:center; background:#111; color:#fff; padding:15px; border-radius:10px; margin-bottom:15px; }
.grid { display:grid; grid-template-columns: repeat(10,1fr); gap:10px; }
.numero { background:#1e1e1e; color:#fff; border-radius:10px; padding:10px; text-align:center; cursor:pointer; transition:.2s; }
.numero:hover{ transform:scale(1.1);} 
.numero.vendido{ background:#b30000;} 
.numero.selected{ outline:3px solid yellow; }
.nombre-tag{ display:block; font-size:10px; background:#fff; color:#000; border-radius:5px; margin-top:5px; }
.btn{ padding:10px; border:none; border-radius:5px; cursor:pointer; margin:5px; }
.btn-wsp{ background:#25D366; color:#fff; width:100%; }
#carrito{ margin-top:15px; padding:10px; background:#eee; border-radius:10px; }
.admin-panel{ margin-top:15px; padding:10px; background:#222; color:#fff; border-radius:10px; display:none; }
.modal{ position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.7); display:none; justify-content:center; align-items:center; }
.modal-content{ background:#fff; padding:20px; border-radius:10px; width:300px; }
canvas{ background:#fff; border-radius:50%; display:block; margin:auto; }
@media(max-width:600px){ .grid{ grid-template-columns: repeat(5,1fr);} }
</style>
</head>

<body>
<div class="container">

<h1>🎟️  MUNDIAL ESPAÑA VS URUGUAY </h1>

<div class="info">
🎁 Premio: 2 Boletos del Mundial Categoria 4 GDL<br>
💰 Precio: $250 MXN<br>
📅 Sorteo en vivo
</div>

<h3 id="progreso"></h3>

<div id="grid" class="grid"></div>

<div id="carrito">
<strong>Boletos seleccionados:</strong>
<div id="lista"></div>
</div>

<button class="btn btn-wsp" onclick="enviarWhatsApp()">📲 Enviar selección</button>

<h2 style="text-align:center;">🎰 Sorteo en vivo</h2>
<canvas id="ruleta" width="350" height="350"></canvas>
<button id="btnGirar" style="display:none;margin:auto;margin-top:10px;" onclick="girarRuleta()">🎯 Girar Ruleta</button>

<div id="adminPanel" class="admin-panel">
<h3>Panel Admin</h3>
<button onclick="modo='editar'">✏️ Editar</button>
<button onclick="modo='borrar'">🗑️ Borrar</button>
<button onclick="modo='asignar'">➕ Asignar</button>
<button onclick="toggleFiltro()">📊 Ver disponibles</button>
<button onclick="salirAdmin()">❌ Salir</button>
</div>

</div>

<div id="modal" class="modal">
<div class="modal-content">
<h3>Asignar Nombre</h3>
<input id="inputNombre" type="text" placeholder="Nombre">
<br><br>
<button onclick="guardarNombre()">Guardar</button>
</div>
</div>

<script>

// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyD2y58felmkZRByE8VAhS17pGFNmcnZ1wM",
  authDomain: "-mundial-f841a.firebaseapp.com",
  databaseURL: "https://-mundial-f841a-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "-mundial-f841a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ADMIN
const USER_HASH = CryptoJS.MD5("GORDO123ROSO").toString();
const PASS_HASH = CryptoJS.MD5("mundial2026gordo").toString();

// DATOS
let boletos = Array(200).fill(null);
let seleccionados = [];
let admin=false;
let modo='';
let indexActual=null;
let filtro=false;
let anguloActual=0;

// TIEMPO REAL (ARREGLADO)
db.ref('rifa4').on('value', snapshot => {
  let data = snapshot.val();

  if (data && Array.isArray(data)) {
    boletos = Array(200).fill(null);
    data.forEach((val, i) => {
      boletos[i] = val || null;
    });
  } else {
    boletos = Array(200).fill(null);
  }

  render();
});

// BLOQUEOS
window.addEventListener('contextmenu', e=>e.preventDefault());
window.addEventListener('keydown', e=>{ if(e.ctrlKey && e.key==='m') login(); });

// LOGIN
function login(){
let user=prompt('Usuario');
let pass=prompt('Contraseña');
if(CryptoJS.MD5(user).toString()===USER_HASH && CryptoJS.MD5(pass).toString()===PASS_HASH){
admin=true;
document.getElementById('adminPanel').style.display='block';
document.getElementById('btnGirar').style.display='block';
alert('Modo admin activado');
}else alert('Incorrecto');
}

// RENDER
function render(){
let grid=document.getElementById('grid'); grid.innerHTML='';
boletos.forEach((n,i)=>{
if(filtro && n) return;
let div=document.createElement('div');
div.className='numero '+(n?'vendido':'');
if(seleccionados.includes(i)) div.classList.add('selected');
div.innerHTML=`<strong>${i+1}</strong>`+(n?`<span class='nombre-tag'>${n}</span>`:'');
div.onclick=()=>clickNumero(i);
grid.appendChild(div);
});
actualizarProgreso(); actualizarLista(); dibujarRuleta();
}

// CLICK
function clickNumero(i){
if(admin){
indexActual=i;

if(modo==='editar' && boletos[i]){
document.getElementById('modal').style.display='flex';
document.getElementById('inputNombre').value=boletos[i];
}

if(modo==='borrar' && boletos[i]){
if(confirm('¿Borrar?')){
boletos[i]=null;
db.ref('rifa4').set([...boletos]);
}
}

if(modo==='asignar' && !boletos[i]){
document.getElementById('modal').style.display='flex';
}

return;
}

if(boletos[i]) return alert('Ya vendido');

if(seleccionados.includes(i))
seleccionados=seleccionados.filter(x=>x!==i);
else
seleccionados.push(i);

render();
}

// GUARDAR
function guardarNombre(){
let nombre=document.getElementById('inputNombre').value.trim();

if(nombre){
boletos[indexActual]=nombre;
db.ref('rifa4').set([...boletos]);
}

document.getElementById('modal').style.display='none';
document.getElementById('inputNombre').value='';
}

// WHATSAPP
function enviarWhatsApp(){
let nombre = prompt("Tu nombre:");
let msg=`Hola soy ${nombre}, quiero los boletos: ${seleccionados.map(n=>n+1).join(', ')}`;
window.open(`https://wa.me/521TU_NUMERO?text=${encodeURIComponent(msg)}`);
}

// PROGRESO
function actualizarProgreso(){
let vendidos=boletos.filter(x=>x).length;
document.getElementById('progreso').innerText=vendidos+' / 200 vendidos';
}

function actualizarLista(){
document.getElementById('lista').innerText=seleccionados.map(n=>n+1).join(', ');
}

// RULETA
function obtenerParticipantes(){ return boletos.map((n,i)=> n?{n,i}:null).filter(Boolean); }

function dibujarRuleta(){
let canvas=document.getElementById('ruleta');
let ctx=canvas.getContext('2d');
let participantes=obtenerParticipantes();
let total=participantes.length;
ctx.clearRect(0,0,350,350);
if(total===0) return;
let ang=(2*Math.PI)/total;
participantes.forEach((p,i)=>{
ctx.beginPath(); ctx.moveTo(175,175);
ctx.arc(175,175,175,i*ang,(i+1)*ang);
ctx.fillStyle=`hsl(${i*360/total},70%,50%)`;
ctx.fill();
ctx.save(); ctx.translate(175,175);
ctx.rotate(i*ang+ang/2);
ctx.fillStyle='#fff'; ctx.font='10px Arial';
ctx.fillText(p.i+1,120,5);
ctx.restore();
});
}

// GIRAR
function girarRuleta(){
if(!admin) return alert('Solo admin');
let participantes=obtenerParticipantes(); if(participantes.length===0) return;
let ganadorIndex=Math.floor(Math.random()*participantes.length);
let anguloParte=360/participantes.length;
let giro=3600+(360-ganadorIndex*anguloParte);
anguloActual+=giro;
let canvas=document.getElementById('ruleta');
canvas.style.transition='transform 4s ease-out';
canvas.style.transform=`rotate(${anguloActual}deg)`;
setTimeout(()=>{
let g=participantes[ganadorIndex];
alert(`🎉 Ganador: ${g.n} (Boleto ${g.i+1})`);
},4000);
}

// SALIR ADMIN
function salirAdmin(){
admin=false;
modo='';
document.getElementById('adminPanel').style.display='none';
document.getElementById('btnGirar').style.display='none';
}

function toggleFiltro(){ filtro=!filtro; render(); }

</script>

</body>
</html>
